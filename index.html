<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Rhayssa ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.love {
    position: relative;
    width: 500px;
    height: 500px;
}

.block-heart {
    width: 18px;
    height: 18px;
    position: absolute;
    background: url("https://upload.wikimedia.org/wikipedia/commons/4/49/Red_heart.svg");
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0;
    transform: translateY(100px) scale(0);
    animation: rise 0.6s forwards;
}

@keyframes rise {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.pulse {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

.name {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 45px;
    color: white;
    opacity: 0;
    transition: 2s;
    text-shadow: 0 0 15px red;
}

.subtitle {
    position: absolute;
    bottom: -60px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: white;
    opacity: 0;
    transition: 2s;
}
</style>
</head>

<body>

<div class="love" id="love">
    <div class="name" id="name">Rhayssa ❤️</div>
    <div class="subtitle" id="subtitle">Eu te amo</div>
</div>

<script>
const love = document.getElementById("love");
const nameText = document.getElementById("name");
const subtitle = document.getElementById("subtitle");

function heartShape(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t)
              - 2 * Math.cos(3*t) - Math.cos(4*t);
    return { x, y };
}

let i = 0;
const blocks = [];

const interval = setInterval(() => {
    const t = i * 0.15;
    const { x, y } = heartShape(t);

    const block = document.createElement("div");
    block.className = "block-heart";

    block.style.left = 250 + x * 12 + "px";
    block.style.top = 250 - y * 12 + "px";
    block.style.animationDelay = (i * 0.02) + "s";

    love.appendChild(block);
    blocks.push(block);

    i++;
    if (i > 120) {
        clearInterval(interval);

        setTimeout(() => {
            blocks.forEach(b => b.classList.add("pulse"));
            nameText.style.opacity = "1";
            subtitle.style.opacity = "1";
        }, 1500);
    }

}, 40);
</script>

</body>
</html>
